services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql+psycopg://smarthealth:${POSTGRES_PASSWORD}@db:5432/smarthealth
      RATELIMIT_STORAGE_URI: redis://redis:6379/0
      PRIVATE_UPLOAD_ROOT: /var/lib/smarthealth/private_uploads
      SEED_REFERENCE_DATA: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - private_uploads:/var/lib/smarthealth/private_uploads
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: smarthealth
      POSTGRES_USER: smarthealth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smarthealth -d smarthealth"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  private_uploads:
